
<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Broafix</title>

  <style>
    :root {
      --bg: #f5f5f5;
      --card: #ffffff;
      --primary: #2563eb;
      --primary-dark: #1e40af;
      --text: #222;
      --muted: #666;
      --sidebar: #1f2937;
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .layout {
      display: flex;
      min-height: 100vh;
    }

    /* SIDEBAR */
    .sidebar {
      width: 260px;
      background: var(--sidebar);
      color: white;
      padding: 25px 20px;
    }

    .sidebar-logo {
      max-width: 160px;
      display: block;
      margin-bottom: 25px;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .nav a {
      text-decoration: none;
      background: var(--primary);
      color: white;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 15px;
      transition: 0.2s ease;
    }

    .nav a:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    /* CONTENT */
    .content {
      flex: 1;
      padding: 40px 30px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .hero {
      background: var(--card);
      width: 100%;
      max-width: 750px;
      padding: 50px 30px;
      border-radius: var(--radius);
      text-align: center;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    .hero img {
      max-width: 180px;
      margin-bottom: 20px;
    }

    .hero h2 {
      font-size: 32px;
      margin: 10px 0;
    }

    .hero p {
      font-size: 16px;
      color: var(--muted);
      margin-bottom: 30px;
    }

    .cta-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .cta-buttons a {
      text-decoration: none;
      background: var(--primary);
      color: white;
      padding: 12px 18px;
      border-radius: 10px;
      font-weight: bold;
      transition: 0.2s;
    }

    .cta-buttons a:hover {
      background: var(--primary-dark);
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .layout {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        text-align: center;
      }

      .nav {
        flex-direction: column;
      }

      .content {
        padding: 30px 15px;
      }

      .hero {
        padding: 35px 20px;
      }

      .hero h2 {
        font-size: 26px;
      }
    }
  </style>
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <img src="Broafix_logo2.png" alt="Broafix logo" class="sidebar-logo">

    <nav class="nav">
      <a href="GOLF.html">Volkswagen Golf - Kuopio</a>
      <a href="FEI.html">Transporter - Karjalohja</a>
      <a href="testiauto.html">Testiauto</a>
    </nav>
  </aside>

  <!-- MAIN -->
  <main class="content">
    <section class="hero">

      <img src="Broafix_logo.png" alt="Broafix logo">

      <h2>Tervetuloa Broafix-sivustolle</h2>

      <p>
        Autovuokraus sekä huolto Karjalohjalla ja Kuopiossa.<br>
      </p>

      <div class="cta-buttons">
        <a href="karjalohja.html">Karjalohjan toimipiste</a>
        <a href="kuopio.html">Kuopion toimipiste</a>
      </div>

    </section>
  </main>

</div>

</body>
</html>
