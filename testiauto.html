<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pakettiauton vuokraus - Volkswagen Transporter 1999 - Karjalohja</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
      color: #222;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    h1, h2 {
      text-align: center;
      margin: 10px 0;
    }

    .card {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .company-id {
      text-align: center;
      font-size: 13px;
      color: #555;
      margin: 0 0 18px 0;
    }

    .price {
      font-size: 24px;
      font-weight: bold;
      color: #2c7a2c;
      text-align: center;
    }

    input, textarea, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 14px;
    }

    button {
      background-color: #2c7a2c;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background-color: #256b25;
    }

    .result {
      margin-top: 10px;
      font-weight: bold;
      color: #2c7a2c;
    }

    .top-buttons {
      position: fixed;
      top: 15px;
      right: 15px;
      display: flex;
      gap: 10px;
      z-index: 1000;
    }

    .top-button {
      background: #2c7a2c;
      color: white;
      padding: 10px 16px;
      border-radius: 20px;
      text-decoration: none;
    }

    .top-button:hover {
      background: #256b25;
    }

    .footer-company {
      text-align: center;
      font-size: 13px;
      color: #555;
      margin-top: 10px;
    }

    @media (max-width: 640px) {
      .container {
        padding-top: 70px;
      }
    }
  </style>
</head>

<body>

  <div class="top-buttons">
    <a href="index.html" class="top-button">🏠 Etusivulle</a>
    <a href="javascript:history.back()" class="top-button">← Edellinen sivu</a>
  </div>

  <div class="container">
    <h1>Pakettiauto Volkswagen Transporter 1999</h1>
    <p class="company-id">Broafix Oy · Y:3579719-5</p>

    <div class="card">
      <p class="price">40 € / vrk</p>
      <p>
        Pakettiauto kuljetuksiin ja muuttoihin. Tavaratilan koko n. 5,4 m³<br>
        Sijaitsee Karjalohjalla.
      </p>
      <img src="transporter.jpg" style="width:160px; border-radius:8px;">
    </div>

    <!-- ✅ SimplyBook -->
    <div class="card">
      <h2>Varaa aika</h2>

      <script src="//widget.simplybook.it/v2/widget/widget.js"></script>
      <script>
        var widget = new SimplybookWidget({
          widget_type: "iframe",
          url: "https://broafix.simplybook.it",
          theme: "minimal"
        });
      </script>
    </div>

    <!-- ✅ Formspree varalla -->
    <div class="card">
      <h2>Vaihtoehtoinen varaus</h2>

      <form action="https://formspree.io/f/xykveewp" method="POST">
        <input type="text" name="name" placeholder="Nimi" required>
        <input type="email" name="email" placeholder="Sähköposti" required>
        <input type="text" name="phone" placeholder="Puhelin" required>

        <input type="date" id="start" onchange="laskeHinta()" required>
        <input type="date" id="end" onchange="laskeHinta()" required>

        <div class="result" id="tulos"></div>

        <button type="submit">Lähetä varauspyyntö</button>
      </form>
    </div>

    <p class="footer-company">Broafix Oy · Y:3579719-5</p>
  </div>

  <script>
    function laskeHinta() {
      const alku = new Date(document.getElementById("start").value);
      const loppu = new Date(document.getElementById("end").value);

      if (!alku || !loppu) return;

      const paivat = Math.ceil((loppu - alku) / (1000 * 60 * 60 * 24));

      if (paivat <= 0) {
        document.getElementById("tulos").innerText = "Tarkista päivät";
        return;
      }

      const hinta = paivat * 40;

      document.getElementById("tulos").innerText =
        "Arvio: " + paivat + " päivää, " + hinta + " €";
    }
  </script>

</body>
</html>
